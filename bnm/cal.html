<style>
/* ====== Booking Table (Desktop) ====== */
.bk-wrap {
  width: 100%;
  margin: 0 auto;
  font-family: Arial, sans-serif;
}

.bk-table {
  width: 100%;
  border-collapse: collapse;
  margin-bottom: 16px;
}

.bk-table th,
.bk-table td {
  border: 1px solid #ddd;
  padding: 14px 12px;
  text-align: center;
  vertical-align: middle;
}

.bk-table th {
  background: #f2f2f2;
  white-space: nowrap;
  font-size: 14px;
}

/* Inputs */
.bk-table input[type="number"],
.bk-table input[type="date"] {
  padding: 10px 12px;
  border: 1px solid #ccc;
  border-radius: 4px;
  width: 100%;
  box-sizing: border-box;
  font-size: 14px;
}

.bk-table input[type="radio"] {
  transform: scale(1.2);
  margin-right: 8px;
}

.bk-label {
  display: flex;
  align-items: center;
  justify-content: center;
}

/* WhatsApp button */
.bk-actions {
  display: flex;
  justify-content: flex-end;
  margin: 8px 0 18px;
}
.bk-wa-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  border-radius: 6px;
  border: 1px solid #EDBA22;
  background: #EDBA22;
  color: #fff;
  text-decoration: none;
  font-weight: 600;
  transition: .15s ease-in-out;
}
.bk-wa-btn:hover {
  background: #EDBA22;
  border-color: #EDBA22;
}
.bk-wa-btn:active {
  transform: translateY(1px);
}
.bk-wa-btn svg {
  width: 18px;
  height: 18px;
  fill: currentColor;
}

/* ====== Card Layout (Mobile & Tablet) ====== */
@media (max-width: 900px) {
  .bk-table,
  .bk-table thead,
  .bk-table tbody,
  .bk-table th,
  .bk-table td,
  .bk-table tr {
    display: block;
    width: 100%;
  }

  .bk-table thead {
    display: none;
  }

  .bk-table tr {
    margin-bottom: 16px;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 12px;
    background: #fff;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);

  .bk-table td {
    border: none;
    padding: 8px 0;
    text-align: left;
    display: flex;
    justify-content: space-between;
    gap: 12px;
  }

  .bk-table td::before {
    content: attr(data-label);
    font-weight: 600;
    flex: 1;
    color: #444;
  }

  .bk-table td > * {
    flex: 2;
  }

  .bk-table input[type="number"],
  .bk-table input[type="date"] {
    width: 100%;
  }

  /* WhatsApp button center on mobile */
  .bk-actions {
    justify-content: center;
  }
}

<script>
document.addEventListener("DOMContentLoaded", function() {
  const today = new Date().toISOString().split("T")[0];
  document.querySelectorAll(".bk-date").forEach(el => {
    el.setAttribute("min", today);
    el.value = today; // Auto-select today's date
  });
});

(function(){
  function initBooking(attempts){
    const root = document.getElementById('bkBooking');
    const titleEl = document.querySelector('.product_title, h1.entry-title');
    if(!root || !titleEl){
      if((attempts||0) < 20){ return setTimeout(()=>initBooking((attempts||0)+1), 150); }
      return;
    }

    // ---------- helpers ----------
    function getCurrencySymbol(){
      const bdi = document.querySelector('.summary .price bdi');
      if(bdi){
        const txt = bdi.textContent.trim();
        const m = txt.match(/^\D+/) || txt.match(/[^\d.,]+$/);
        if(m && m[0].trim()) return m[0].trim();
      }
      return (root.dataset.currency && root.dataset.currency.trim()) || 'AED';
    }
    const CURRENCY = getCurrencySymbol();
    const fmt = v => `${CURRENCY} ${Number(v||0).toFixed(2)}`;

    function toNumberStrict(txt){
      if(txt==null) return null;
      let s = String(txt).trim().replace(/\u00A0/g,' ');
      s = s.replace(/[^\d.,-]/g,'');
      const lastComma = s.lastIndexOf(','), lastDot = s.lastIndexOf('.');
      if(lastComma > -1 && lastComma > lastDot){ s = s.replace(/\./g,'').replace(',','.'); }
      else { s = s.replace(/,/g,''); }
      const n = parseFloat(s); return Number.isFinite(n)?n:null;
    }

    function detectAdultWoo(){
      const meta = document.querySelector('meta[itemprop="price"]');
      if(meta && meta.content){ const v=toNumberStrict(meta.content); if(v && v>0) return v; }
      const el = document.querySelector('.summary .price .woocommerce-Price-amount, .summary .price .amount, .summary .price bdi');
      if(el){ const v=toNumberStrict(el.textContent); if(v && v>0) return v; }
      const all=[...document.querySelectorAll('.summary .price,.entry-summary .price')].map(n=>toNumberStrict(n.textContent)).filter(v=>v && v>0);
      return all[0]||null;
    }

    // ---------- sheet matching ----------
    function getSheet(){
      try { return JSON.parse(document.getElementById('bkSheetMap').textContent || '{}'); }
      catch(e){ return {}; }
    }
    const SHEET = getSheet();

    const norm = s => (s||'')
      .toLowerCase()
      .normalize('NFKD').replace(/[\u0300-\u036f]/g,'')
      .replace(/[|[\]{}"'`~!@#$%^*_+=<>.?\\-]/g,' ')
      .replace(/&/g,' and ')
      .replace(/\s+/g,' ')
      .trim();

    const productTitle = titleEl.textContent.trim();
    const Nprod = norm(productTitle);

    function bestMatch(){
      let best=null, score=0;
      for(const key in SHEET){
        const Nk = norm(key); if(!Nk) continue;
        let sc=0;
        if(Nprod.includes(Nk) || Nk.includes(Nprod)) sc = 1000 + Math.min(Nk.length, Nprod.length);
        else {
          const a=new Set(Nprod.split(' ')), b=new Set(Nk.split(' '));
          let overlap=0; a.forEach(t=>{ if(b.has(t)) overlap++; });
          sc = overlap;
        }
        if(sc>score){ score=sc; best={key, data:SHEET[key]}; }
      }
      return best;
    }

    // ---------- DOM ----------
    const inAdultQty   = root.querySelector('.bk-adult-qty');
    const inChildQty   = root.querySelector('.bk-child-qty');
    const inAdultPrice = root.querySelector('.bk-adult-price');
    const inChildPrice = root.querySelector('.bk-child-price');
    const outAdultQty  = root.querySelector('.bk-adult-qty-out');
    const outChildQty  = root.querySelector('.bk-child-qty-out');
    const outAdultPr   = root.querySelector('.bk-adult-price-out');
    const outChildPr   = root.querySelector('.bk-child-price-out');
    const outTotal     = root.querySelector('.bk-total');
    const outGrand     = document.getElementById('bkGrandTotal');
    const noteEl       = document.getElementById('bkNote');

    function setNote(show){ if(noteEl) noteEl.style.display = show ? 'block' : 'none'; }

    // ---------- seed ----------
    const wooAdult = detectAdultWoo(); // may be sale price etc.
    const match = bestMatch();

    if(match && match.data){
      if(match.data.manual){
        setNote(true);
        inAdultPrice.value = wooAdult ?? '';
        inChildPrice.value = '';                          // manual => child blank
      }else{
        setNote(false);
        const a = (match.data.adult!=null) ? match.data.adult : (wooAdult ?? 0);
        let c = null;
        if(match.data.child!=null){ c = match.data.child; }
        inAdultPrice.value = a;
        inChildPrice.value = (c!=null) ? c : '';
      }
    }else{
      setNote(false);
      inAdultPrice.value = wooAdult ?? '';
      inChildPrice.value = '';
    }

    function safeNum(v, fb){ const n = toNumberStrict(v); return Number.isFinite(n)?n:(fb==null?null:fb); }
    function update(){
      const aQ = Math.max(0, parseInt(inAdultQty.value||'0',10));
      const cQ = Math.max(0, parseInt(inChildQty.value||'0',10));
      const aP = safeNum(inAdultPrice.value, null);
      const cP = safeNum(inChildPrice.value, null);

      const adultTotal = (aP && aP > 0) ? (aQ * aP) : 0;
      const childTotal = (cP && cP > 0) ? (cQ * cP) : 0;

      if(outAdultQty) outAdultQty.textContent = aQ;
      if(outChildQty) outChildQty.textContent = cQ;
      if(outAdultPr)  outAdultPr.textContent  = (aP && aP > 0) ? fmt(aP) : '—';
      if(outChildPr)  outChildPr.textContent  = (cP && cP > 0) ? fmt(cP) : '—';

      const total = adultTotal + childTotal;

      if(outTotal) outTotal.textContent = total > 0 ? fmt(total) : '—';
      if(outGrand) outGrand.textContent = total > 0 ? fmt(total) : '—';

      return {aQ,cQ,aP,cP,total};
    }

    ['input','change'].forEach(ev=>{
      inAdultQty.addEventListener(ev, update);
      inChildQty.addEventListener(ev, update);
      inAdultPrice.addEventListener(ev, update);
      inChildPrice.addEventListener(ev, update);
    });

    update();

    // ---------- WhatsApp button ----------
    const waBtn = document.getElementById('bkWAButton');
    if(waBtn){
      waBtn.addEventListener('click', function(e){
        e.preventDefault();
        const stats = update();
        const date = (root.querySelector('.bk-date').value || 'N/A');
        const title = document.querySelector('.product_title, h1.entry-title')?.textContent?.trim() || 'Offer';
        const page = window.location.href;

        const lines = [];
        lines.push('Hello, I would like to book this offer:');
        lines.push('');
        lines.push(`• Offer: ${title}`);
        lines.push(`• Date: ${date}`);

        if (stats.aQ > 0){
          if (stats.aP && stats.aP > 0){
            lines.push(`• Adults: ${stats.aQ} × ${fmt(stats.aP)}`);
          } else {
            lines.push(`• Adults: ${stats.aQ} → What is the Adult price?`);
          }
        }

        if (stats.cQ > 0){
          if (stats.cP && stats.cP > 0){
            lines.push(`• Children: ${stats.cQ} × ${fmt(stats.cP)}`);
          } else {
            lines.push(`• Children: ${stats.cQ} → What is the Child price?`);
          }
        }

        lines.push(`• Total: ${stats.total > 0 ? fmt(stats.total) : '—'}`);
        lines.push('');
        lines.push(`Link: ${page}`);

        const msg = encodeURIComponent(lines.join('\n'));
        const url = `https://wa.me/971559571122?text=${msg}`;
        window.open(url, '_blank');
      });
    }
  }

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', ()=>initBooking(0));
  }else{
    initBooking(0);
  }
})();
</script>
